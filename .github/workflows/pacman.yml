name: Generate Pacman Contribution Graph

on:
  schedule:
    # Jalankan otomatis setiap jam 00:00 UTC
    - cron: "0 0 * * *"
  
  # Memungkinkan untuk dijalankan secara manual dari tab Actions
  workflow_dispatch:
  
  push:
    branches:
      - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Step 1: Checkout repositori kamu
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Generate animasi Pac-Man SVG dari kontribusi GitHub kamu
      - name: Generate github-contribution-pacman.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wtfaboutyou
          outputs: |
            pacman.svg?color_snake=%23ff0000&color_dots=%23ebedf0,%239be9a8,%2340c463,%2330a14e,%23216e39
            pacman-dark.svg?palette=github-dark&color_snake=%23ffff00

      # Step 3: Commit dan push file pacman.svg langsung ke root repositori
      - name: Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update pacman contribution graph [skip ci]"
          file_pattern: "*.svg"
